<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS2 HUD Editor</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <div class="editor-container">
    <h1>🎮 CS2 HUD Overlay</h1>

    <!-- Mode Status (NEW - SIMPLIFIED) -->
    <div class="settings-group mode-status-section">
      <div id="modeStatus" class="mode-indicator">
        <div class="mode-icon">⏳</div>
        <div class="mode-text">
          <div class="mode-title">Waiting for Data...</div>
          <div class="mode-subtitle">Start LIVE spectate or load a DEMO</div>
        </div>
      </div>
    </div>

    <!-- Demo Controls (SIMPLIFIED) -->
    <div class="settings-group demo-section">
      <h2>📽️ Demo Mode</h2>
      
      <div class="setting-item">
        <div class="demo-buttons">
          <button id="selectDemoBtn" class="btn-demo">📁 Load Demo</button>
          <button id="stopDemoBtn" class="btn-demo btn-stop" disabled>⏹️ Stop Demo</button>
        </div>
      </div>

      <div class="setting-item">
        <span id="demoFileName" class="demo-file-info">No demo loaded</span>
      </div>
    </div>

    <!-- Color Settings -->
    <div class="settings-group">
      <h2>🎨 Colors</h2>
      
      <div class="setting-item">
        <label for="bgColor">Background:</label>
        <div class="color-input-group">
          <input type="color" id="bgColor" value="#1a1a1a">
          <input type="text" id="bgColorText" value="#1a1a1a" readonly>
        </div>
      </div>

      <div class="setting-item">
        <label for="textColor">Text Color:</label>
        <div class="color-input-group">
          <input type="color" id="textColor" value="#ffffff">
          <input type="text" id="textColorText" value="#ffffff" readonly>
        </div>
      </div>

      <div class="setting-item">
        <label for="accentColor">Accent Color:</label>
        <div class="color-input-group">
          <input type="color" id="accentColor" value="#00ff00">
          <input type="text" id="accentColorText" value="#00ff00" readonly>
        </div>
      </div>
    </div>

    <!-- Appearance Settings -->
    <div class="settings-group">
      <h2>✨ Appearance</h2>

      <div class="setting-item">
        <label for="opacity">Opacity:</label>
        <div class="slider-group">
          <input type="range" id="opacity" min="0" max="1" step="0.1" value="0.9">
          <span id="opacityValue">0.9</span>
        </div>
      </div>

      <div class="setting-item">
        <label for="fontSize">Font Size:</label>
        <div class="slider-group">
          <input type="range" id="fontSize" min="8" max="24" step="1" value="14">
          <span id="fontSizeValue">14px</span>
        </div>
      </div>

      <div class="setting-item">
        <label for="fontFamily">Font Family:</label>
        <select id="fontFamily">
          <option value="Arial">Arial</option>
          <option value="Verdana">Verdana</option>
          <option value="Georgia">Georgia</option>
          <option value="Courier New">Courier New</option>
          <option value="Trebuchet MS">Trebuchet MS</option>
        </select>
      </div>
    </div>

    <!-- Presets -->
    <div class="settings-group">
      <h2>💾 Presets</h2>
      <div class="preset-buttons">
        <input type="text" id="presetName" placeholder="Preset name">
        <button id="savePresetBtn">Save</button>
        <button id="loadPresetBtn">Load</button>
        <button id="deletePresetBtn">Delete</button>
      </div>
      <select id="presetList"></select>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button id="applyBtn" class="btn-primary">✅ Apply Changes</button>
      <button id="resetBtn" class="btn-secondary">↺ Reset to Default</button>
    </div>
  </div>

  <script src="editor.js"></script>
</body>
</html>
