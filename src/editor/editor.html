<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS2 HUD Editor</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <div class="editor-container">
    <h1>HUD Style Editor</h1>

    <!-- Demo Controls (NEW) -->
    <div class="settings-group demo-section">
      <h2>📽️ Demo Mode (For Commentators)</h2>
      
      <div class="setting-item">
        <label>Load Demo File:</label>
        <div class="demo-buttons">
          <button id="selectDemoBtn" class="btn-demo">Select .DEM File</button>
          <span id="demoFileName" style="margin-left: 10px; color: #999;">No file selected</span>
        </div>
      </div>

      <div class="setting-item">
        <label>Demo Status:</label>
        <div style="display: flex; gap: 10px;">
          <button id="parseDemoBtn" class="btn-primary" disabled>Parse Demo</button>
          <button id="stopDemoBtn" class="btn-secondary" disabled>Stop Demo</button>
        </div>
      </div>

      <div class="setting-item">
        <label>Status:</label>
        <div id="demoStatus" style="padding: 10px; background: #2a2a2a; border-radius: 5px; color: #00ff00;">
          ❌ No demo loaded
        </div>
      </div>
    </div>

    <!-- Color Settings -->
    <div class="settings-group">
      <h2>Colors</h2>
      
      <div class="setting-item">
        <label for="bgColor">Background Color:</label>
        <div class="color-input-group">
          <input type="color" id="bgColor" value="#1a1a1a">
          <input type="text" id="bgColorText" value="#1a1a1a" readonly>
        </div>
      </div>

      <div class="setting-item">
        <label for="textColor">Text Color:</label>
        <div class="color-input-group">
          <input type="color" id="textColor" value="#ffffff">
          <input type="text" id="textColorText" value="#ffffff" readonly>
        </div>
      </div>

      <div class="setting-item">
        <label for="accentColor">Accent Color:</label>
        <div class="color-input-group">
          <input type="color" id="accentColor" value="#00ff00">
          <input type="text" id="accentColorText" value="#00ff00" readonly>
        </div>
      </div>
    </div>

    <!-- Opacity Settings -->
    <div class="settings-group">
      <h2>Appearance</h2>

      <div class="setting-item">
        <label for="opacity">Opacity:</label>
        <div class="slider-group">
          <input type="range" id="opacity" min="0" max="1" step="0.1" value="0.9">
          <span id="opacityValue">0.9</span>
        </div>
      </div>

      <div class="setting-item">
        <label for="fontSize">Font Size:</label>
        <div class="slider-group">
          <input type="range" id="fontSize" min="8" max="24" step="1" value="14">
          <span id="fontSizeValue">14px</span>
        </div>
      </div>
    </div>

    <!-- Font Settings -->
    <div class="settings-group">
      <h2>Font</h2>

      <div class="setting-item">
        <label for="fontFamily">Font Family:</label>
        <select id="fontFamily">
          <option value="Arial">Arial</option>
          <option value="Verdana">Verdana</option>
          <option value="Georgia">Georgia</option>
          <option value="Courier New">Courier New</option>
          <option value="Trebuchet MS">Trebuchet MS</option>
          <option value="Comic Sans MS">Comic Sans MS</option>
        </select>
      </div>
    </div>

    <!-- Player Data -->
    <div class="settings-group">
      <h2>Player Data</h2>

      <div class="setting-item">
        <label for="playerName">Nickname:</label>
        <input type="text" id="playerName" value="Player123">
      </div>

      <div class="setting-item">
        <label for="playerHP">HP:</label>
        <input type="number" id="playerHP" min="0" max="100" value="85">
      </div>

      <div class="setting-item">
        <label for="playerArmor">Armor:</label>
        <input type="number" id="playerArmor" min="0" max="100" value="100">
      </div>

      <div class="setting-item">
        <label for="weapon">Weapon:</label>
        <input type="text" id="weapon" value="AK-47">
      </div>

      <div class="setting-item">
        <label for="ammo">Ammo:</label>
        <input type="number" id="ammo" min="0" value="30">
      </div>

      <div class="setting-item">
        <label for="damage">Damage:</label>
        <input type="number" id="damage" min="0" value="31">
      </div>
    </div>

    <!-- Preset Management -->
    <div class="settings-group">
      <h2>Presets</h2>
      <div class="preset-buttons">
        <input type="text" id="presetName" placeholder="Preset name">
        <button id="savePresetBtn">Save Preset</button>
        <button id="loadPresetBtn">Load Preset</button>
        <button id="deletePresetBtn">Delete Preset</button>
      </div>
      <select id="presetList"></select>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button id="applyBtn" class="btn-primary">Apply Changes</button>
      <button id="resetBtn" class="btn-secondary">Reset to Default</button>
    </div>
  </div>

  <script src="editor.js"></script>
</body>
</html>
